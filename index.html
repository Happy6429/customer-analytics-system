<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Insights Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">🛒 Customer Insights Dashboard</h1>
        
        <!-- KPI Cards Row -->
        <div class="row mb-4">
            <div class="col-lg-3 col-md-6">
                <div class="card text-center bg-primary text-white">
                    <div class="card-body">
                        <h5 id="totalKPI" class="card-title">0</h5>
                        <p>Total Customers</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="card text-center bg-success text-white">
                    <div class="card-body">
                        <h5 id="avgKPI" class="card-title">₹0</h5>
                        <p>Avg Purchase</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="card text-center bg-warning text-white">
                    <div class="card-body">
                        <h5 id="topKPI">-</h5>
                        <p>Top Spender</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="card text-center bg-info text-white">
                    <div class="card-body">
                        <h5 id="topCityKPI">-</h5>
                        <p>Top City</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5>Add New Customer</h5>
                    </div>
                    <div class="card-body">
                        <form id="customerForm">
                            <div class="mb-3">
                                <label for="name" class="form-label">Name</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                            <div class="mb-3">
                                <label for="age" class="form-label">Age</label>
                                <input type="number" class="form-control" id="age" min="18" max="100" required>
                            </div>
                            <div class="mb-3">
                                <label for="city" class="form-label">City</label>
                                <input type="text" class="form-control" id="city" required>
                            </div>
                            <div class="mb-3">
                                <label for="purchase" class="form-label">Purchase Amount (₹)</label>
                                <input type="number" class="form-control" id="purchase" min="0" step="0.01" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" id="addBtn">Add Customer</button>
                        </form>
                        <div id="formMessage" class="mt-2"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5>Quick Insights</h5>
                        <button class="btn btn-sm btn-outline-info" onclick="loadInsights()">🔄 Refresh</button>
                    </div>
    <div class="card-body">
                        <div id="kpiSection" class="d-none"></div>
                        <canvas id="segmentChart" height="250"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Additional Charts Row -->
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5>City-wise Avg Purchase</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="cityChart" height="250"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5>Age Distribution</h5>
                    </div>
<canvas id="ageChart" height="250"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Customers List <span id="totalCount" class="badge bg-secondary ms-2">0</span></h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0" id="customersTable">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Age</th>
                                        <th>City</th>
                                        <th>Purchase</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-success" onclick="loadCustomers()">🔄 Refresh List</button>
                        <button class="btn btn-warning ms-2" onclick="initDB()">Initialize DB</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Toasts -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="successToast" class="toast" role="alert">
            <div class="toast-header bg-success text-white">
                <strong class="me-auto">Success</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body"></div>
        </div>
        <div id="errorToast" class="toast" role="alert">
            <div class="toast-header bg-danger text-white">
                <strong class="me-auto">Error</strong>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        // Auto load on start
        window.onload = function() {
            loadCustomers();
            loadInsights();
        };
    </script>
</body>
</html>
